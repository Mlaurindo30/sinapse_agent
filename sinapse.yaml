# sinapse.yaml — Configuração central do Sinapse Agent
# Camada de memória universal para qualquer agente (Hermes, Claude Code, Codex, OpenCode, Cursor)

# =============================================================================
# PROJETO
# =============================================================================
project:
  name: sinapse_agent
  version: 2.0.0
  description: >
    Camada de memória universal para agentes de IA. Indexa um vault Obsidian
    (cerebro/) em um knowledge graph queryable via Graphify, complementado por
    tracking granular de eventos (claude-mem) e otimização de execução (RTK).
    Um clone, um ./install.sh, todos os agentes conectados.

# =============================================================================
# VAULT (fonte única de verdade)
# =============================================================================
vault:
  path: cerebro/                          # relativo à raiz do projeto
  format: obsidian                        # vault Obsidian com frontmatter YAML
  language: pt-BR                         # idioma do vault
  indexer: graphify                       # ferramenta que indexa o vault
  watch: true                             # reindexa automaticamente ao detectar mudanças

# =============================================================================
# GRAPHIFY (camada 1 — estrutural: O QUE existe)
# =============================================================================
graphify:
  package: graphifyy                      # nome do pacote PyPI (double-y)
  install_method: uv                      # uv | pipx | pip
  extras: [all]                           # pdf, office, video, mcp, neo4j, ollama, etc
  output_dir: cerebro/graphify-out/       # output do knowledge graph
  mcp_port: 0                             # 0 = stdio, ou porta para HTTP
  watch: true                             # --watch flag
  obsidian_export: true                   # --obsidian flag
  global_graph: false                     # --global (ativar quando multi-projeto)

# =============================================================================
# CLAUDE-MEM (camada 2 — temporal: QUEM/QUANDO)
# =============================================================================
claude_mem:
  port: 37700                             # porta padrão do worker
  install_method: npx                     # npx claude-mem install
  worker_autostart: true                  # inicia worker junto

# =============================================================================
# NEURAL MEMORY (camada 4 — associativa: COMO conceitos se relacionam)
# =============================================================================
neural_memory:
  package: neural-memory                # pipx install neural-memory
  install_method: source                  # uv pip install -e neural-memory/
  src_dir: neural-memory/                 # source local
  recall_timeout: 5                     # segundos

# =============================================================================
# RTK (camada 3 — execução: COMO otimizar)
# =============================================================================
rtk:
  plugin_dir: rtk/hooks/hermes/rtk-rewrite/  # plugin Hermes
  install_path: ~/.hermes/plugins/rtk-rewrite/  # destino no Hermes

# =============================================================================
# SINAPSE MCP (servidor universal de leitura + escrita)
# =============================================================================
sinapse_mcp:
  command: "python3 scripts/sinapse-mcp.py"
  transport: stdio
  enabled: true
  config_template: mcp/sinapse-memory.json
  tools:
    - sinapse_query          # busca unificada em todos os backends
    - sinapse_save_decision   # salva decisão no vault
    - sinapse_save_learning   # salva aprendizado no Patterns.md
    - sinapse_health          # health check completo
    - sinapse_session_end     # finaliza sessão, atualiza Current State
    - sinapse_temporal_search # busca direta no claude-mem (FTS5 + Chroma)
    - sinapse_temporal_save   # salva observação no claude-mem ou fallback vault
    - sinapse_zettelkasten_split # particiona notas monolíticas em notas atômicas Zettelkasten

# =============================================================================
# AGENTES SUPORTADOS
# =============================================================================
agents:
  supported:
    - hermes        # native: plugin Python com hooks pre_prompt / post_tool / post_session
    - claude-code   # mcp: sinapse-mcp.py + CLAUDE.md
    - codex         # mcp: sinapse-mcp.py + AGENTS.md
    - kilocode      # mcp: sinapse-mcp.py + AGENTS.md
    - openclaw      # mcp: sinapse-mcp.py + workspace files
    - copilot       # mcp: via GitHub MCP integration
    - opencode      # mcp: sinapse-mcp.py + AGENTS.md
    - gemini-cli    # mcp: sinapse-mcp.py + GEMINI.md
    - zoocode       # mcp: sinapse-mcp.py (sucessor do Roo Code)
    - cursor        # mcp: sinapse-mcp.py + AGENTS.md
    - aider         # mcp: sinapse-mcp.py
  integration_methods:
    native: [hermes]
    mcp: [claude-code, codex, kilocode, openclaw, copilot, opencode, gemini-cli, zoocode, cursor, aider]
    workspace: [openclaw]
    cli: [sinapse-write]
  install_methods:
    hermes: "graphify install --platform hermes"
    claude-code: "configure MCP server sinapse-memory in ~/.claude/.mcp.json"
    codex: "configure MCP server sinapse-memory in ~/.codex/mcp.json"
    kilocode: "configure MCP server sinapse-memory in kilo.json"
    openclaw: "configure MCP server sinapse-memory in ~/.openclaw/openclaw.json"
    copilot: "configure MCP server sinapse-memory"
    opencode: "configure MCP server sinapse-memory"
    gemini-cli: "configure MCP server sinapse-memory"
    zoocode: "configure MCP server sinapse-memory"
    cursor: "configure MCP server sinapse-memory"
    aider: "configure MCP server sinapse-memory"

# =============================================================================
# MCP SERVERS
# =============================================================================
mcp_servers:
  graphify:
    command: "bash scripts/serve-graph.sh"
    transport: stdio
    enabled: true
  claude_mem:
    command: "node claude-mem/mcp-server.js"
    transport: stdio
    port: 37700
    enabled: true
  sinapse_memory:
    command: "python3 scripts/sinapse-mcp.py"
    transport: stdio
    enabled: true

# =============================================================================
# CLOUD (Fase 4.3 — Desacoplamento para VPS)
# =============================================================================
cloud:
  enabled: false                          # Se true, os hooks locais agem como clientes da nuvem
  url: "http://localhost:8000"           # Endpoint padrão para testes locais
  api_key: "${SINAPSE_API_KEY}"          # Token de autenticação seguro

# =============================================================================
# FILESYSTEM (camada 5 — híbrida busca direta no vault)
# =============================================================================
# O backend filesystem elimina o gap de indexação do Graphify (até 6h) fazendo
# busca direta nos arquivos .md do vault. Funciona como fallback quando o
# graph.json está indisponível ou como fonte complementar para dados mais recentes.
# É o componente central do HYBRID SEARCH — deduplicação cross-backend garante
# que o mesmo arquivo não apareça duas vezes quando Graphify + filesystem
# indexam o mesmo conteúdo.
# =============================================================================
hybrid_search:
  enabled: true
  backends:
    - graphify        # camada 1 — estrutural (indexado a cada 6h)
    - claude_mem      # camada 2 — temporal (eventos em tempo real)
    - rtk             # camada 3 — execução (otimização de comandos)
    - neural_memory   # camada 4 — associativa (relacionamentos conceituais)
    - filesystem      # camada 5 — direta (leitura real-time dos .md)
  filesystem:
    enabled: true
    categories:       # diretórios do vault escaneados em busca direta
      - work
      - work/active
      - work/archive
      - brain
      - atoms
      - org
      - reference
      - templates
    cache_ttl: 30     # segundos — TTL do cache do scan recursivo
    max_results: 15   # limit de observações retornadas por busca
  dedup:              # elimina duplicados cross-backend
    enabled: true
    keys:             # campos usados para identificar duplicados
      observations:
        - source_file
        - title
        - content
      nodes:
        - id
        - label

# =============================================================================
# CRON
# =============================================================================
cron:
  sync_schedule: "0 */6 * * *"            # a cada 6 horas
  rebuild_schedule: "0 2 * * 0"           # domingo 2am rebuild completo

